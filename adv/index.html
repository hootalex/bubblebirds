<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BubbleBirds</title>
    <style>
        html, body {
            background: black;
        }

         .bubblestage, body {
          width: 100vw;
          height: 100vh;
          overflow: hidden;
        }

        @keyframes pop {
  from {transform: scale(1); background-image: none; background-color: rgba(255,255,255,.75); opacity:1}
  to {transform: scale(2); background-image: none;  background-color: transparent; opacity:.5}
}

        .popped {
          animation: pop 0.25s forwards;
        }

        .score {
          font-family: 'Helvetica', 'Arial', sans-serif;
          position: absolute;
          top: 20px;
          right: 20px;
          color: white;
          font-size: 24px;
        }

        .bubble {
          background-size: cover;
          background-position: center;
          cursor: pointer;
          transition: transform 0.1s;
        }

        .bubble:hover {
          transform: scale(1.05);
        }

        .bird-name {
          font-family: 'Helvetica', 'Arial', sans-serif;
          position: absolute;
          top: 20px;
          left: 20px;
          color: white;
          font-size: 18px;
        }

        </style>
  </head>
  <body>

<div class="bubblestage">

<div class="bird-name">Listening for: <span id="current-bird"></span></div>
<div class="score">Pop the bubble of the bird you hear. Click anywhere to start!</div>

</div>

<script   src="https://code.jquery.com/jquery-3.7.1.min.js"   integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="   crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js" integrity="sha512-xi/RZRIF/S0hJ+yJJYuZ5yk6/8pCiRlEXZzoguSMl+vk2i3m6UjUO/WcZ11blRL/O+rnj94JRGwt/CHbc9+6EA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>

let birdData = [];
let currentBirdId = null;
let currentBirdAudio = null;
let score = 0;
let gameStarted = false;

// Fetch bird data from Audubon using HTTPS to avoid mixed content
const apiUrl = 'https://media.audubon.org/release/en/12.08/full_manifest.json';

fetch(apiUrl)
  .then(response => {
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    return response.json();
  })
  .then(data => {
    birdData = data.filter(bird => {
      const files = bird.files || [];
      const hasAudio = files.some(f => f.type === 'audio');
      const hasThumb = files.some(f => f.type === 'thumbnail');
      return hasAudio && hasThumb;
    });
    console.log(`Loaded ${birdData.length} birds with audio and thumbnails`);
  })
  .catch(error => {
    console.error('Error loading bird data:', error);
    alert('Failed to load bird data. Please check your internet connection and try again.');
  });

function getRandomBirds(count) {
  const shuffled = [...birdData].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

function getThumbnailUrl(bird) {
  const files = bird.files || [];
  const thumbnail = files.find(f => f.type === 'thumbnail');
  if (thumbnail && thumbnail.resized_storage && thumbnail.resized_storage.convert) {
    // Ensure HTTPS to avoid mixed content errors
    return thumbnail.resized_storage.convert.path.replace(/^http:/, 'https:');
  }
  return null;
}

function getAudioUrl(bird) {
  const files = bird.files || [];
  const audio = files.find(f => f.type === 'audio');
  if (audio && audio.original_path) {
    // Ensure HTTPS to avoid mixed content errors
    return audio.original_path.replace(/^http:/, 'https:');
  }
  return null;
}

$(document).ready(function() {
    var stage = $(".bubblestage");
    var width = stage.width() - 150;
    var height = stage.height();

    function createBubble(bird) {
        const thumbnailUrl = getThumbnailUrl(bird);
        if (!thumbnailUrl) return;

        var bubble = $("<div class='bubble' data-bird-id='" + bird.id + "'></div>");
        bubble.css({
            "position": "absolute",
            "width": "25vw",
            "height": "25vw",
            "max-width": "150px",
            "max-height": "150px",
            "background-color": "rgba(255, 255, 255, 0.5)",
            "border-radius": "50%",
            "left": Math.random() * width + "px",
            "top": "100vh",
            "background-image": "url('" + thumbnailUrl + "')",
            "background-size": "cover",
            "background-position": "center",
            "opacity": 0.95,
            "outline": "1px solid rgba(255,255,255,0.5)",
            "outline-offset": "-1px",
        });
        bubble.attr('crossOrigin', 'anonymous');
        stage.append(bubble);
        animateBubble(bubble);
    }

    function animateBubble(bubble) {
        var duration = 5000 + Math.random() * 5000;
        bubble.animate({ top: "-100vh" }, duration, function() {
            bubble.remove();
        });
    }

    function startNewRound() {
        if (birdData.length < 4) {
            console.log('Not enough bird data loaded yet. Available:', birdData.length);
            return;
        }

        // Get 4 random birds
        const randomBirds = getRandomBirds(4);
        currentBirdId = randomBirds[0].id;

        // Update bird name
        $('#current-bird').text(randomBirds[0].title);

        // Create bubbles for all 4 birds first
        const bubblesCreated = randomBirds.map(bird => {
            createBubble(bird);
            return bird;
        }).filter(bird => getThumbnailUrl(bird) !== null).length;

        if (bubblesCreated === 0) {
            console.log('Failed to create any bubbles');
            return;
        }

        // Play the bird's audio
        const audioUrl = getAudioUrl(randomBirds[0]);
        if (audioUrl) {
            if (currentBirdAudio) {
                currentBirdAudio.stop();
            }
            currentBirdAudio = new Howl({
                src: [audioUrl],
                volume: 0.5,
                crossOrigin: 'anonymous',
                onload: function() {
                    console.log('Audio loaded successfully');
                },
                onerror: function() {
                    console.error('Failed to load audio:', audioUrl);
                }
            });
            currentBirdAudio.play();
            // Stop audio after 10 seconds max
            setTimeout(function() {
                if (currentBirdAudio && currentBirdAudio.playing()) {
                    currentBirdAudio.stop();
                }
            }, 10000);
        } else {
            console.log('No audio URL available for this bird');
        }
    }

    $(document).on("click", function(e) {
        if (!gameStarted) {
            gameStarted = true;
            $('.score').text('Score: 0');
            startNewRound();
            return;
        }

        if ($(e.target).hasClass('bubble')) {
            var bubble = $(e.target);
            var birdId = bubble.data('bird-id');

            bubble.addClass('popped');
            setTimeout(function() {
                bubble.remove();
            }, 250);

            if (String(birdId) === String(currentBirdId)) {
                score++;
                $('.score').text('Score: ' + score);
                console.log('Correct! Score:', score);
                // Delay before next round to allow animation
                setTimeout(function() {
                    if (birdData.length > 0) {
                        startNewRound();
                    }
                }, 800);
            } else {
                score = Math.max(0, score - 1);
                $('.score').text('Score: ' + score);
                console.log('Wrong! Score:', score);
            }
        }
    });

});

</script>

  </body>
</html>
