<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BubbleBirds</title>
    <style>
        html, body {
            background: black;
        }

         .bubblestage, body {
          width: 100vw;
          height: 100vh;
          overflow: hidden;
        }

        .blur {
          filter: blur(20px);
        }
  

        @keyframes pop {
  from {transform: scale(1); background-image: none; background-color: rgba(255,255,255,.75); opacity:1}
  to {transform: scale(2); background-image: none;  background-color: transparent; opacity:0}
}

        @keyframes scoreIncrease {
  from {transform: scale(1.2); color: green;}
  to {transform: scale(1); color: white}
}

        @keyframes scoreDecrease {
  from {transform: scale(.8); color: red;}
  to {transform: scale(1); color: white;}
}

        .popped {
          animation: pop 0.25s forwards;
        }

        .score-increase {
          animation: scoreIncrease .5s;
        }

        .score-decrease {
          animation: scoreDecrease .5s;
        }

        .score, .birdname {
          color: white;
          font-family: 'Arial', sans-serif;
          font-size: 24px;
          background: black;
          padding: 5px;
          border-radius: 5px;
          z-index: 99;
        }

        .score {
          position: absolute;
          top: 20px;
          right: 20px;
        }

        .bubble {
          background-size: cover;
          background-position: center;
          cursor: pointer;
          transition: transform 0.1s;
        }

        .bubble:hover {
          transform: scale(1.05);
        }

        .birdname {
          position: absolute;
          top: 20px;
          left: 20px;
        }

        .level {
          color: white;
          font-family: 'Arial', sans-serif;
          font-size: 24px;
          background: black;
          padding: 5px;
          border-radius: 5px;
          z-index: 99;
          position: absolute;
          bottom: 20px;
          left: 20px;
        }

        .game-end-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: rgba(0, 0, 0, 0.95);
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          z-index: 1000;
          color: white;
          font-family: 'Arial', sans-serif;
          text-align: center;
        }

        .game-end-screen h1 {
          font-size: 48px;
          margin-bottom: 30px;
        }

        .game-end-screen .final-score {
          font-size: 36px;
          margin-bottom: 20px;
        }

        .game-end-screen .final-level {
          font-size: 36px;
          margin-bottom: 40px;
        }

        .game-end-screen .game-over-text {
          font-size: 24px;
          margin-bottom: 30px;
          color: #aaa;
        }

        .game-end-screen button {
          padding: 15px 40px;
          font-size: 24px;
          background: white;
          color: black;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          font-weight: bold;
        }

        .game-end-screen button:hover {
          background: #ddd;
        }

        </style>
  </head>
  <body>

<div class="bubblestage">

<div class="birdname">Listening for: <span id="current-bird"></span></div>
<div class="score">Pop the bubble of the bird you hear. Click anywhere to start!</div>
<div class="level">Level: <span id="level">1</span></div>

</div>

<script   src="https://code.jquery.com/jquery-3.7.1.min.js"   integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="   crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js" integrity="sha512-xi/RZRIF/S0hJ+yJJYuZ5yk6/8pCiRlEXZzoguSMl+vk2i3m6UjUO/WcZ11blRL/O+rnj94JRGwt/CHbc9+6EA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>

let birdData = [];
let currentBirdId = null;
let currentBirdAudio = null;
let score = 0;
let gameStarted = false;
let roundTimer = null;
let happyPopSound = null;
let sadPopSound = null;
let level = 1;
let bubblesPopped = 0;
let bubbleCountThisRound = 0;

// Fetch bird data from Audubon using HTTPS to avoid mixed content
const apiUrl = 'https://media.audubon.org/release/en/12.08/full_manifest.json';

fetch(apiUrl)
  .then(response => {
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    return response.json();
  })
  .then(data => {
    birdData = data.filter(bird => {
      const files = bird.files || [];
      const hasAudio = files.some(f => f.type === 'audio');
      const hasThumb = files.some(f => f.type === 'thumbnail');
      return hasAudio && hasThumb;
    });
    console.log(`Loaded ${birdData.length} birds with audio and thumbnails`);
  })
  .catch(error => {
    console.error('Error loading bird data:', error);
    alert('Failed to load bird data. Please check your internet connection and try again.');
  });

function getRandomBirds(count) {
  const shuffled = [...birdData].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

function getThumbnailUrl(bird) {
  const files = bird.files || [];
  const thumbnail = files.find(f => f.type === 'thumbnail');
  if (thumbnail && thumbnail.resized_storage && thumbnail.resized_storage.convert) {
    // Ensure HTTPS to avoid mixed content errors
    return thumbnail.resized_storage.convert.path.replace(/^http:/, 'https:');
  }
  return null;
}

function getAudioUrl(bird) {
  const files = bird.files || [];
  const audio = files.find(f => f.type === 'audio');
  if (audio && audio.original_path) {
    // Ensure HTTPS to avoid mixed content errors
    return audio.original_path.replace(/^http:/, 'https:');
  }
  return null;
}

function endGame() {
  gameStarted = false;
  
  if (roundTimer) {
    clearTimeout(roundTimer);
    roundTimer = null;
  }
  
  if (currentBirdAudio) {
    currentBirdAudio.stop();
    currentBirdAudio.unload();
  }
  
  // Create and show end game screen
  const endScreen = $(`
    <div class="game-end-screen">
      <h1>Game Over</h1>
      <div class="game-over-text">You reached Level ${level}</div>
      <div class="final-score">Final Score: ${score}</div>
      <button onclick="location.reload()">Play Again</button>
    </div>
  `);
  
  $('body').append(endScreen);
}

$(document).ready(function() {

$(".birdname").click(function(){
  $(this).toggleClass("blur");
});

    // Initialize pop sounds
    happyPopSound = new Howl({
        src: ['happypop.mp3'],
        volume: 0.5,
        preload: true
    });
    
    sadPopSound = new Howl({
        src: ['sadpop.mp3'],
        volume: 0.5,
        preload: true
    });

    var stage = $(".bubblestage");
    var width = stage.width() - 150;
    var height = stage.height();

    function createBubble(bird) {
        const thumbnailUrl = getThumbnailUrl(bird);
        if (!thumbnailUrl) return;

        var bubble = $("<div class='bubble' data-bird-id='" + bird.id + "'></div>");
        bubble.css({
            "position": "absolute",
            "width": "25vw",
            "height": "25vw",
            "max-width": "150px",
            "max-height": "150px",
            "background-color": "rgba(255, 255, 255, 0.5)",
            "border-radius": "50%",
            "left": Math.random() * width + "px",
            "top": "100vh",
            "background-image": "url('" + thumbnailUrl + "')",
            "background-size": "cover",
            "background-position": "center",
            "opacity": 0.95,
            "outline": "1px solid rgba(255,255,255,0.5)",
            "outline-offset": "-1px",
        });
        bubble.attr('crossOrigin', 'anonymous');
        stage.append(bubble);
        animateBubble(bubble);
    }

    function animateBubble(bubble) {
        var duration = 5000 + Math.random() * 5000;
        bubble.animate({ top: "-100vh" }, duration, function() {
            bubble.remove();
        });
    }

    function startNewRound() {
        if (birdData.length < 4) {
            console.log('Not enough bird data loaded yet. Available:', birdData.length);
            return;
        }

        // Clear any existing round timer
        if (roundTimer) {
            clearTimeout(roundTimer);
        }

        // Reset bubble pop counter for this round
        bubblesPopped = 0;

        // Calculate number of birds based on level (level 1 = 2 birds, level 2 = 3 birds, etc.)
        const birdCount = Math.min(level + 1, birdData.length);
        bubbleCountThisRound = birdCount;

        // Get random birds based on level
        const randomBirds = getRandomBirds(birdCount);
        currentBirdId = randomBirds[0].id;

        // Update bird name
        $('#current-bird').text(randomBirds[0].title);

        // Create bubbles for all birds for this level
        // Create incorrect birds first, then correct bird last so it appears on top
        const bubblesCreated = randomBirds.slice(1).map(bird => {
            createBubble(bird);
            return bird;
        }).concat(randomBirds.slice(0, 1).map(bird => {
            createBubble(bird);
            return bird;
        })).filter(bird => getThumbnailUrl(bird) !== null).length;

        if (bubblesCreated === 0) {
            console.log('Failed to create any bubbles, trying again');
            // If all bubbles failed, try again with different birds
            setTimeout(startNewRound, 500);
            return;
        }

        // Set timer to auto-progress to next round after bubbles finish animating
        // Bubbles animate 5-10 seconds (5000 + random 0-5000), add 1.5 second buffer
        roundTimer = setTimeout(function() {
            console.log('Round ended, bubbles popped this round:', bubblesPopped);
            if (gameStarted && birdData.length > 0) {
                // Check if any bubbles were popped
                if (bubblesPopped === 0) {
                    console.log('No bubbles popped! Game Over.');
                    endGame();
                } else {
                    // Progress to next level
                    level++;
                    $('#level').text(level);
                    startNewRound();
                }
            }
        }, 11500);

        // Play the bird's audio
        const audioUrl = getAudioUrl(randomBirds[0]);
        
        if (audioUrl) {
            if (currentBirdAudio) {
                currentBirdAudio.stop();
                currentBirdAudio.unload();
            }
            currentBirdAudio = new Howl({
                src: [audioUrl],
                volume: 0.5,
                crossOrigin: 'anonymous',
                html5: true,
                preload: true,
                onload: function() {
                    console.log('Audio loaded successfully');
                    currentBirdAudio.play();
                    
                    // Stop audio after 10 seconds max
                    setTimeout(function() {
                        if (currentBirdAudio && currentBirdAudio.playing()) {
                            currentBirdAudio.stop();
                        }
                    }, 10000);
                },
                onerror: function() {
                    console.error('Failed to load audio:', audioUrl);
                }
            });
        } else {
            console.log('No audio URL available for this bird');
        }
    }

    $(document).on("click", function(e) {
        if (!gameStarted) {
            gameStarted = true;
            level = 1;
            score = 0;
            $('#level').text(level);
            $('.score').text('Score: 0');
            startNewRound();
            return;
        }

        if ($(e.target).hasClass('bubble')) {
            // Clear auto-progress timer when user interacts
            if (roundTimer) {
                clearTimeout(roundTimer);
                roundTimer = null;
            }

            var bubble = $(e.target);
            var birdId = bubble.data('bird-id');

            bubble.addClass('popped');
            bubblesPopped++;
            
            setTimeout(function() {
                bubble.remove();
            }, 250);

            if (String(birdId) === String(currentBirdId)) {
                // Check if blur mode is active (double points)
                const isBlurMode = $('.birdname').hasClass('blur');
                score += isBlurMode ? 2 : 1;
                
                const $scoreEl = $('.score');
                $scoreEl.addClass('score-increase');
                $scoreEl.text('Score: ' + score);
                console.log('Correct! Score:', score);
                
                // Play happy pop sound
                if (happyPopSound) {
                    happyPopSound.play();
                }
                
                setTimeout(function() {
                    $scoreEl.removeClass('score-increase');
                }, 1000);
                // Delay before next round to allow animation
                setTimeout(function() {
                    if (birdData.length > 0) {
                        level++;
                        $('#level').text(level);
                        startNewRound();
                    }
                }, 800);
            } else {
                // Wrong guess - end the game
                console.log('Wrong bubble clicked! Game Over.');
                
                // Play sad pop sound
                if (sadPopSound) {
                    sadPopSound.play();
                }
                
                setTimeout(function() {
                    endGame();
                }, 500);
            }
        }
    });

});

</script>

  </body>
</html>
